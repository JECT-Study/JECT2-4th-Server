spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}/neondb?sslmode=require&channelBinding=require
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      minimum-idle: 0
      maximum-pool-size: ${DB_POOL_MAX_SIZE:3}
      idle-timeout: 30000
      connection-timeout: 30000
      validation-timeout: 3000
      keepalive-time: 0
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            scope:
              - email
              - profile
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful

app:
  oauth2:
    # 운영 도메인 확정 후 실제 URL로 교체 필요 (관련 이슈: #43)
    redirect-success-url: https://example.com/oauth2/redirect
  cookie:
    secure: true
  jwt:
    secret: ${APP_JWT_SECRET}
    access-token-expiration-seconds: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
    refresh-token-expiration-seconds: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:2592000}

  cors:
    # 브라우저 기반 운영 도메인은 APP_CORS_ALLOWED_ORIGINS에 콤마로 구분해 설정합니다.
    # 예: https://vs.io.kr,https://admin.vs.io.kr
    # 로컬 프론트 개발 편의를 위해 기본값에 localhost:3000을 임시 포함합니다.
    # 백엔드 서버간 직접 호출에는 브라우저 CORS 검사가 적용되지 않습니다.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://vs.io.kr,http://localhost:3000,http://127.0.0.1:3000}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With,Accept,Origin}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
    max-age: ${APP_CORS_MAX_AGE:3600}

management:
  server:
    port: 8081
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
