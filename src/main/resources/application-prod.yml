spring:
  datasource:
    url: jdbc:h2:mem:proddb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            scope:
              - email
              - profile

app:
  oauth2:
    # 운영 도메인 확정 후 실제 URL로 교체 필요 (관련 이슈: #43)
    redirect-success-url: https://example.com/oauth2/redirect
  cookie:
    secure: true
  jwt:
    secret: ${JWT_SECRET:}
    accessTokenExpirationSeconds: 3600
    refreshTokenExpirationSeconds: 86400

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never