spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}/neondb?sslmode=require&channelBinding=require
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      minimum-idle: 0
      maximum-pool-size: ${DB_POOL_MAX_SIZE:3}
      idle-timeout: 30000
      connection-timeout: 30000
      validation-timeout: 3000
      keepalive-time: 0
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            scope:
              - email
              - profile
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful

app:
  oauth2:
    # 운영 도메인 확정 후 실제 URL로 교체 필요 (관련 이슈: #43)
    redirect-success-url: https://example.com/oauth2/redirect
  cookie:
    secure: true
  jwt:
    secret: ${APP_JWT_SECRET}
    access-token-expiration-seconds: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
    refresh-token-expiration-seconds: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}

management:
  server:
    port: 8081
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
