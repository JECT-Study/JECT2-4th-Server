spring:
  application:
    name: vs-server
  jackson:
    serialization:
      write-dates-as-timestamps: false

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_S3_REGION:ap-northeast-2}
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}

# GA4 Measurement Protocol (행동 로그를 GA4 대시보드로도 전송 — PM/디자이너용)
# enabled=true + Measurement ID(G-XXXX) + API secret이 모두 있어야 실제 전송. 없으면 no-op(RDB 적재는 그대로).
# 자격증명은 GA4 콘솔에서 발급: Admin → Data Streams(웹 스트림 = Measurement ID) / Measurement Protocol API secrets(= API secret)
google:
  analytics:
    enabled: ${GA_ENABLED:false}
    measurement-id: ${GA_MEASUREMENT_ID:}
    api-secret: ${GA_API_SECRET:}
    endpoint: ${GA_ENDPOINT:https://www.google-analytics.com/mp/collect}

# Amplitude HTTP V2 API (행동 로그를 Amplitude 대시보드로도 전송 — PM/디자이너용)
# enabled=true + API Key가 있어야 실제 전송. 없으면 no-op(RDB 적재는 그대로).
# API Key는 Amplitude 콘솔에서 발급: Settings → Projects → 해당 프로젝트의 API Key
amplitude:
  enabled: ${AMPLITUDE_ENABLED:false}
  api-key: ${AMPLITUDE_API_KEY:}
  endpoint: ${AMPLITUDE_ENDPOINT:https://api2.amplitude.com/2/httpapi}

gemini:
  project-id: ${GEMINI_PROJECT_ID:}
  # 서울(asia-northeast3)은 Gemini 모델 미지원 → us-central1 사용. GEMINI_LOCATION으로 override 가능
  location: ${GEMINI_LOCATION:us-central1}
  # gemini-1.5 retired, 2.0-flash는 이 프로젝트 접근권 없음(404). 접근 확인된 2.5-flash 사용. GEMINI_MODEL로 override 가능
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  enabled: ${GEMINI_ENABLED:false}

# 오늘의 추천 투표 설정 권한 (운영진 user id 목록)
admin:
  user-ids:
    - 7
    - 260
