name: CI - Pull Request

on:
  issue_comment:
    types: [ created ]
  pull_request:
    types: [ labeled, ready_for_review ]

jobs:
  # 댓글 트리거 빌드
  build-on-comment:
    name: PR 빌드 검증 (댓글)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '빌드 시작') }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: PR 브랜치 확인
        id: get_branch
        run: |
          PR_NUMBER=$(jq --raw-output .issue.number "$GITHUB_EVENT_PATH")
          BRANCH_NAME=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | \
            jq -r .head.ref)
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Repository 접근
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get_branch.outputs.branch }}

      - name: JDK 25 셋팅
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Gradle 의존성 캐싱
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 프로젝트 빌드
        run: ./gradlew build

      - name: 빌드 결과 댓글
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const message = status === 'success'
              ? ' **빌드 성공** \n배포 준비 완료!'
              : ' **빌드 실패** \n코드를 확인해주세요.';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

  # 라벨 또는 Ready for review 트리거 빌드
  build-on-label-or-ready:
    name: PR 빌드 검증 (라벨/Ready)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (github.event.action == 'ready_for_review' || github.event.label.name == 'ready-to-build') }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Repository 접근
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: JDK 25 셋팅
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Gradle 의존성 캐싱
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 프로젝트 빌드
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: ./gradlew build

      - name: 빌드 결과 댓글
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const message = status === 'success'
              ? ' **빌드 성공** \n배포 준비 완료!'
              : ' **빌드 실패** \n코드를 확인해주세요.';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: message
            });

      - name: 라벨 제거
        if: ${{ always() && github.event.action == 'labeled' }}
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'ready-to-build'
              });
            } catch (e) {}